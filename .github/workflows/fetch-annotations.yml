name: Fetch Annotations

on:
  schedule:
    - cron: '0 12 * * 0'  # Weekly on Sunday at 12 PM UTC
    # - cron: '0 */4 * * *'  # Every 4 hours (testing)
  workflow_dispatch:

permissions:
  contents: write  # Required to push commits

jobs:
  fetch-annotations:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Fetch annotations and generate TSV
        run: python scripts/fetch_annotations.py
        
      - name: Commit and push TSV file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add annotations.tsv
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo '{"added":"0","removed":"0"}' > /tmp/diff_stats.json
          else
            ADDED=$(git diff --staged --numstat annotations.tsv | awk '{print $1}')
            REMOVED=$(git diff --staged --numstat annotations.tsv | awk '{print $2}')
            TOTAL=$(tail -n +2 annotations.tsv | wc -l | tr -d ' ')
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "Fetch annotations — ${TIMESTAMP}, +${ADDED:-0} new, -${REMOVED:-0} removed, ${TOTAL} total"
            git push
          fi
